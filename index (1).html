<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IL CAPONE CHAT — Videoproiezione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0B12; --smoke:#16161F; --smoke-2:#1E1E29; --chalk:#F3F1F7; --chalk-dim:#9C9AAE;
    --magenta:#FF2E88; --cyan:#2EE6FF; --lime:#C8FF4D; --line: rgba(243,241,247,0.12);
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 700px at 20% -10%, rgba(255,46,136,0.16), transparent 60%),
      radial-gradient(ellipse 1000px 700px at 85% 0%, rgba(46,230,255,0.12), transparent 55%),
      var(--ink);
    color:var(--chalk); font-family:var(--body);
    display:flex; flex-direction:column; overflow:hidden;
  }
  ::-webkit-scrollbar{width:0; display:none;}

  .header{
    position:relative;
    text-align:center;
    padding:clamp(18px,3vh,40px) 20px clamp(20px,3.5vh,44px);
    border-bottom:1px dashed var(--line);
    flex-shrink:0;
  }
  .header::after{
    content:""; position:absolute; left:0; right:0; bottom:-11px; height:22px;
    background-image:radial-gradient(circle at center, var(--ink) 0 6px, transparent 6.5px);
    background-size:22px 22px; background-repeat:repeat-x; background-position:center;
  }
  .venue-name{
    font-family:var(--display); font-weight:700;
    font-size:clamp(28px, 5.2vw, 68px);
    line-height:1.05; letter-spacing:-.01em;
    background:linear-gradient(120deg, #fff, var(--cyan));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .by-line{
    margin-top:8px;
    font-family:var(--mono);
    font-size:clamp(11px, 1.1vw, 16px);
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--chalk-dim);
  }
  .by-line b{color:var(--lime); font-weight:700;}

  .venue-photo-wrap{
    display:flex; justify-content:center; padding:clamp(10px,2vh,20px) 20px 0;
    flex-shrink:0;
  }
  .venue-photo{
    max-height:min(26vh, 260px);
    max-width:min(90%, 560px);
    border-radius:18px;
    object-fit:cover;
    border:1px solid var(--line);
    box-shadow:0 30px 60px -25px rgba(0,0,0,0.6);
  }

  .quiz-wrap{ padding:clamp(10px,2vh,18px) clamp(20px,4vw,60px) 0; flex-shrink:0; }
  .quiz-card{
    background:linear-gradient(120deg, rgba(200,255,77,0.14), rgba(46,230,255,0.08));
    border:1px solid rgba(200,255,77,0.4);
    border-radius:20px;
    padding:clamp(14px,2vh,24px) clamp(18px,3vw,32px);
  }
  .quiz-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .quiz-tag{font-family:var(--mono); font-size:clamp(11px,1vw,14px); letter-spacing:.15em; color:var(--lime); text-transform:uppercase;}
  .quiz-timer{font-family:var(--mono); font-weight:700; color:var(--lime); font-size:clamp(18px,2vw,28px);}
  .quiz-q{font-family:var(--display); font-weight:700; font-size:clamp(18px,2.4vw,30px); margin-bottom:12px;}
  .quiz-opts{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .quiz-opt{
    background:var(--smoke-2); border:1px solid var(--line); border-radius:12px;
    padding:clamp(10px,1.4vh,16px); font-size:clamp(14px,1.4vw,20px); font-weight:600;
  }
  .quiz-opt.correct{background:var(--lime); color:var(--ink); border-color:var(--lime);}

  .feed{
    flex:1; min-height:0;
    overflow-y:auto;
    padding:clamp(16px,2.5vh,30px) clamp(20px,5vw,80px);
    display:flex; flex-direction:column; gap:clamp(8px,1.2vh,16px);
  }
  .row{ display:flex; }
  .row.admin{ justify-content:center; }
  .bubble{
    max-width:72%;
    padding:clamp(10px,1.3vh,16px) clamp(14px,1.6vw,22px);
    border-radius:18px;
    font-size:clamp(14px,1.5vw,22px);
    line-height:1.4;
    animation:rise .3s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .bubble .who{
    display:block; font-weight:700;
    font-size:clamp(10.5px,0.85vw,14px);
    letter-spacing:.03em; margin-bottom:4px;
  }
  .bubble.guest{ background:var(--smoke-2); border:1px solid var(--line); }
  .bubble.guest .who{ color:var(--cyan); }
  .bubble.admin{
    background:rgba(200,255,77,0.12); border:1px solid rgba(200,255,77,0.4); color:var(--lime);
    text-align:center; font-weight:600; max-width:85%;
  }
  .bubble.admin .who{ color:var(--lime); }

  .empty-state{
    flex:1; display:flex; align-items:center; justify-content:center;
    color:var(--chalk-dim); font-size:clamp(16px,2vw,26px); text-align:center; padding:20px;
  }

  .footer-strip{
    flex-shrink:0; display:flex; justify-content:space-between; align-items:center;
    padding:10px clamp(20px,4vw,60px); border-top:1px solid var(--line);
    font-family:var(--mono); font-size:clamp(10px,0.9vw,13px); color:var(--chalk-dim);
  }
  .dot-live{width:8px;height:8px;border-radius:50%;background:var(--lime); display:inline-block; margin-right:6px; animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,255,77,0.5);}70%{box-shadow:0 0 0 10px rgba(200,255,77,0);}100%{box-shadow:0 0 0 0 rgba(200,255,77,0);}}
</style>
</head>
<body>

<div class="header">
  <div class="venue-name" id="venueName">IL CAPONE CHAT</div>
  <div class="by-line">by <b>Alberto Seminerio</b></div>
</div>

<div class="venue-photo-wrap" id="photoWrap" style="display:none;">
  <img class="venue-photo" id="venuePhoto" alt="">
</div>

<div class="quiz-wrap" id="quizWrap" style="display:none;"></div>

<div class="feed" id="feed">
  <div class="empty-state">In attesa dei primi messaggi… inquadra il QR e unisciti alla chat! 🎉</div>
</div>

<div class="footer-strip">
  <span><span class="dot-live"></span>IN DIRETTA</span>
  <span id="presenceLabel">0 presenti</span>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyB-P0VYZ7W2ZuLskkrzYns5KHBQBBhK1sE",
  authDomain: "il-capone-chat.firebaseapp.com",
  projectId: "il-capone-chat",
  storageBucket: "il-capone-chat.firebasestorage.app",
  messagingSenderId: "273475235952",
  appId: "1:273475235952:web:70d7ee2015ff5a7761c4b5"
};

const $ = (id) => document.getElementById(id);
const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
const app = initializeApp(firebaseConfig);
const db = fs.getFirestore(app);

const venueRef = fs.doc(db, "ilcaponechat", "venue");
const participantsCol = fs.collection(db, "ilcaponechat", "venue", "participants");
const messagesCol = fs.collection(db, "ilcaponechat", "venue", "messages");

let venueData = {};
let quizCountdownHandle = null;

fs.onSnapshot(venueRef, (snap) => {
  if(!snap.exists()) return;
  venueData = snap.data();
  $('venueName').textContent = venueData.name || "IL CAPONE CHAT";
  const photoWrap = $('photoWrap'), photo = $('venuePhoto');
  if(venueData.photoUrl){ photo.src = venueData.photoUrl; photoWrap.style.display='flex'; }
  else { photoWrap.style.display='none'; }
  renderQuiz();
});

fs.onSnapshot(fs.query(participantsCol, fs.orderBy("joinedAt","asc")), (snap) => {
  const n = snap.size;
  $('presenceLabel').textContent = `${n} present${n===1?'e':'i'}`;
});

const colorFor = (name) => {
  const COLORS = ['#FF2E88','#2EE6FF','#C8FF4D','#FF9F4D','#B18CFF','#4DFFC0'];
  let h=0; for(const c of (name||'?')) h=(h*31+c.charCodeAt(0))>>>0;
  return COLORS[h%COLORS.length];
};

const feed = $('feed');
fs.onSnapshot(fs.query(messagesCol, fs.orderBy("createdAt","asc"), fs.limitToLast ? fs.limitToLast(60) : fs.limit(60)), (snap) => {
  const list = snap.docs.map(d=>d.data());
  if(!list.length){
    feed.innerHTML = '<div class="empty-state">In attesa dei primi messaggi… inquadra il QR e unisciti alla chat! 🎉</div>';
    return;
  }
  feed.innerHTML = '';
  list.forEach(m=>{
    const row = document.createElement('div');
    row.className = 'row' + (m.type==='admin' ? ' admin' : '');
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (m.type==='admin' ? 'admin' : 'guest');
    const who = document.createElement('span'); who.className='who';
    if(m.type==='admin'){ who.textContent='📣 REGIA'; }
    else { who.textContent = m.who; who.style.color = colorFor(m.who); }
    const body = document.createElement('div'); body.textContent = m.text;
    bubble.appendChild(who); bubble.appendChild(body);
    row.appendChild(bubble);
    feed.appendChild(row);
  });
  feed.scrollTop = feed.scrollHeight;
});

function renderQuiz(){
  const wrap = $('quizWrap');
  const quiz = venueData.quiz;
  clearInterval(quizCountdownHandle);
  if(!quiz || !quiz.active){ wrap.style.display='none'; wrap.innerHTML=''; return; }
  const tick = () => {
    const left = Math.max(0, Math.ceil(quiz.duration - (Date.now()-quiz.startedAtMs)/1000));
    wrap.style.display='block';
    wrap.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-top"><span class="quiz-tag">❓ Quiz lampo</span><span class="quiz-timer">${left}s</span></div>
        <div class="quiz-q">${quiz.q}</div>
        <div class="quiz-opts">${quiz.opts.map(o=>`<div class="quiz-opt">${o}</div>`).join('')}</div>
      </div>`;
    if(left<=0) clearInterval(quizCountdownHandle);
  };
  tick();
  quizCountdownHandle = setInterval(tick, 500);
}
</script>
</body>
</html>
