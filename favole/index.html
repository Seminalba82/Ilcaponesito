<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Creatore di Favole Interattive</title>
</head>
<body>
<script>
/* =====================================================================
   BOOT — tutta l'app (stile, illustrazioni, motore narrativo, regia,
   palco con voltapagina, form di creazione, chiamate AI, esportazione)
   vive in questa unica funzione: questo permette di rigenerarla anche
   dentro al file esportato tramite boot.toString().
===================================================================== */
function boot(){
  let STORY = window.STORY || null;

  /* ---------------- STILE ---------------- */
  const CSS_TEXT = `
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap');
  :root{
    --cream:#FFF7E8; --bark:#7A5238; --leaf:#5FB86B; --leaf-dark:#3f9a4c;
    --sun:#FFC93C; --sun-dark:#eab000; --coral:#FF7A64; --coral-dark:#e85f49;
    --sky:#8FD6E6; --ink:#4A3728;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0; font-family:'Quicksand','Trebuchet MS','Verdana',sans-serif; color:var(--ink);}
  body.mode-conductor{ background:#2B2530; min-height:100vh; padding:22px; display:flex; justify-content:center;}
  .panel{ width:100%; max-width:820px; color:#fff; }
  .panel h1{ font-size:1.4rem; margin:0 0 4px; }
  .panel .sub{ color:#c9bcd6; margin:0 0 18px; font-size:0.95rem; }
  .status-row{ display:flex; align-items:center; gap:10px; background:#3A3243; border-radius:14px; padding:12px 16px; margin-bottom:14px;}
  .dot-status{width:12px;height:12px;border-radius:50%; background:#e04b4b;}
  .dot-status.on{background:#5FB86B;}
  .row-buttons{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
  .btn{ border:none; border-radius:14px; padding:12px 18px; font-size:0.95rem; font-weight:bold; cursor:pointer; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.25);}
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.25);}
  .btn:disabled{opacity:0.5; cursor:default;}
  .btn.open{background:#6C5CE7;}
  .btn.mirror{background:#2E86AB;}
  .btn.mirror.active{background:#1c5a73;}
  .btn.restart{background:#555;}
  .btn.generate{background:linear-gradient(160deg,#FFB27A,#FF7A64 60%,#e85f49); font-size:1.05rem; padding:14px 22px;}
  .btn.download{background:linear-gradient(160deg,#8FDB93,#5FB86B 60%,#3f9a4c);}
  .instructions{ background:#3A3243; border-radius:14px; padding:14px 16px; margin-bottom:18px; font-size:0.9rem; line-height:1.5; color:#e6def0;}
  .instructions b{color:#fff;}
  .section-title{ font-size:0.95rem; text-transform:uppercase; letter-spacing:.04em; color:#c9bcd6; margin:18px 0 8px;}
  .preview-box{ background:#3A3243; border-radius:14px; padding:16px; margin-bottom:16px; line-height:1.5; font-size:0.95rem;}
  .trail-mini{display:flex; gap:8px; margin-bottom:14px;}
  .paw-mini{width:20px;height:20px;border-radius:50%; background:#554b60; display:flex; align-items:center; justify-content:center; font-size:11px;}
  .choices-conductor{display:flex; flex-direction:column; gap:10px;}
  .choice-btn{ border:none; border-radius:14px; padding:14px 16px; font-family:'Baloo 2',sans-serif; font-size:1.05rem; font-weight:700; color:#fff; cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; box-shadow:0 4px 0 rgba(0,0,0,.25);}
  .choice-btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.25);}
  .choice-btn.red{background:linear-gradient(160deg,#FF9587,var(--coral) 60%,var(--coral-dark));}
  .choice-btn.yellow{background:linear-gradient(160deg,#FFDD82,var(--sun) 60%,var(--sun-dark)); color:var(--ink);}
  .choice-btn.green{background:linear-gradient(160deg,#8FDB93,var(--leaf) 60%,var(--leaf-dark));}
  .dotc{width:22px;height:22px;border-radius:50%; background:rgba(255,255,255,.6); flex:0 0 auto; display:flex; align-items:center; justify-content:center;}
  .mirror-wrap{ display:none; margin-bottom:18px; }
  .mirror-wrap.show{ display:block; }
  .mirror-bezel{ background:#111; border-radius:14px; padding:10px 10px 16px; box-shadow:0 6px 0 rgba(0,0,0,.3);}
  .mirror-screen{ position:relative; width:100%; aspect-ratio:16/9; border-radius:6px; overflow:hidden; background:#000;}
  .mirror-label{ text-align:center; color:#8a8093; font-size:0.75rem; margin-top:6px; letter-spacing:.05em;}
  .setup-form{display:flex; flex-direction:column; gap:14px; margin-bottom:16px;}
  .field-group label{display:block; font-size:0.85rem; color:#c9bcd6; margin-bottom:5px; font-weight:600;}
  .field-group input[type=text], .field-group textarea, .field-group select{
    width:100%; border:none; border-radius:10px; padding:10px 12px; font-family:'Quicksand',sans-serif; font-size:0.95rem;
    background:#453c4f; color:#fff;
  }
  .field-group textarea{resize:vertical; min-height:60px; font-family:'Quicksand',sans-serif;}
  .field-row{display:flex; gap:12px; flex-wrap:wrap;}
  .field-row .field-group{flex:1; min-width:200px;}
  .loading-box{display:flex; align-items:center; gap:12px; background:#3A3243; border-radius:14px; padding:16px; margin:12px 0;}
  .spinner{width:22px;height:22px; border:3px solid #6C5CE7; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; flex:0 0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{background:#5c2a2a; border-radius:14px; padding:14px 16px; margin:12px 0; color:#ffd7d7; font-size:0.9rem;}
  body.mode-stage{ background:#111; }
  .book-outer{ width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; perspective:2400px; }
  .page{
    position:relative; width:min(100vw, 177.78vh); height:min(100vh, 56.25vw); aspect-ratio:16/9;
    background: radial-gradient(circle at 12% 8%, #FFFDF5 0%, transparent 45%), linear-gradient(180deg,#CFEFE0 0%, var(--cream) 45%);
    border-radius:1.4vh; box-shadow:0 3vh 8vh rgba(0,0,0,.45);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3vh 5vw; text-align:center;
    transform-origin:left center; backface-visibility:hidden; overflow:hidden;
  }
  .page::after{ content:''; position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 3.2vh 3.2vh 0; border-color:transparent rgba(0,0,0,.08) transparent transparent; }
  .art-illustration{ width:min(54vw,54vh); max-height:46vh; margin-bottom:1vh; filter:drop-shadow(0 1.4vh 1.4vh rgba(0,0,0,0.12)); }
  .art-illustration svg{ width:100%; height:100%; display:block; }
  .page h1.title{ font-family:'Baloo 2', sans-serif; font-weight:800; font-size:min(4.3vw,4.3vh); color:var(--bark); margin:0.6vh 0 0.4vh; text-shadow:0 0.3vh 0 rgba(255,255,255,.6), 0 0.5vh 0.6vh rgba(122,82,56,.18); letter-spacing:.01em; }
  .page .subtitle-author{ font-family:'Quicksand', sans-serif; font-size:min(1.35vw,1.35vh); letter-spacing:.16em; color:var(--coral-dark); font-weight:700; margin:0 0 1vh; }
  .page .big-text{ font-family:'Quicksand', sans-serif; font-weight:600; font-size:min(2.5vw,2.5vh); line-height:1.6; max-width:82%; margin:0 auto; color:#3f2e20; }
  .page .prompt-big{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:min(2.65vw,2.65vh); color:var(--bark); max-width:88%; margin:0.6vh auto 1.8vh; line-height:1.35; }
  .options-row{ display:flex; gap:2vw; justify-content:center; width:100%; }
  .opt-card{ flex:1; max-width:27%; position:relative; overflow:hidden; border-radius:2vh; padding:2vh 1vw 1.7vh; color:#fff; font-family:'Baloo 2', sans-serif; font-weight:700; font-size:min(1.65vw,1.65vh); line-height:1.3; box-shadow:0 1.1vh 0 rgba(0,0,0,.16), 0 1.6vh 2vh rgba(0,0,0,.18); border:0.35vh solid rgba(255,255,255,.35); }
  .opt-card::before{ content:''; position:absolute; top:0; left:0; right:0; height:46%; background:linear-gradient(180deg, rgba(255,255,255,.4), rgba(255,255,255,0)); pointer-events:none; }
  .opt-card .emoji-badge{ width:min(4.4vw,4.4vh); height:min(4.4vw,4.4vh); border-radius:50%; background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center; margin:0 auto 0.9vh; font-size:min(2.3vw,2.3vh); box-shadow:0 0.4vh 0 rgba(0,0,0,.12); }
  .opt-card.red{background:linear-gradient(160deg,#FF9587,var(--coral) 60%,var(--coral-dark));}
  .opt-card.yellow{background:linear-gradient(160deg,#FFDD82,var(--sun) 60%,var(--sun-dark)); color:var(--ink);}
  .opt-card.green{background:linear-gradient(160deg,#8FDB93,var(--leaf) 60%,var(--leaf-dark));}
  .end-title-stage{ font-family:'Baloo 2', sans-serif; font-weight:800; font-size:min(3.1vw,3.1vh); color:var(--bark); margin:0.6vh 0 1vh; }
  .moral-stage{ background:#FFF1CE; border:0.3vh dashed var(--sun-dark); border-radius:1.8vh; padding:1.5vh 2vw; margin:1.2vh auto 0; max-width:84%; font-family:'Quicksand', sans-serif; font-weight:600; font-size:min(1.9vw,1.9vh); line-height:1.55; }
  .stage-trail{ position:absolute; top:1.6vh; right:2.4vw; display:flex; gap:0.8vw; }
  .stage-trail .paw{ width:2vh; height:2vh; border-radius:50%; background:#E7DFCB; display:flex; align-items:center; justify-content:center; font-size:1.1vh;}
  .waiting{ color:#9c8fa8; font-size:1.3vh; margin-top:1.4vh;}
  .mirror-screen .page{ position:absolute; inset:0; width:100%; height:100%; border-radius:6px; padding:6% 5%; box-shadow:none; }
  .mirror-screen .art-illustration{ width:44%; max-height:40%; }
  .mirror-screen .title{ font-size:7%; }
  .mirror-screen .subtitle-author{ font-size:2.4%; }
  .mirror-screen .big-text{ font-size:4.2%; }
  .mirror-screen .prompt-big{ font-size:4.4%; }
  .mirror-screen .opt-card{ font-size:2.6%; padding:5% 3%; }
  .mirror-screen .opt-card .emoji-badge{ width:9%; height:9%; font-size:4.6%; }
  .mirror-screen .end-title-stage{ font-size:5.4%; }
  .mirror-screen .moral-stage{ font-size:3.2%; padding:3% 4%; }
  `;
  let styleTag = document.getElementById('appStyle');
  if(!styleTag){ styleTag = document.createElement('style'); styleTag.id='appStyle'; document.head.appendChild(styleTag); }
  styleTag.textContent = CSS_TEXT;

       <radialGradient id="furRiccio" cx="35%" cy="30%" r="75%"><stop offset="0" stop-color="#A9764C"/><stop offset="60%" stop-color="#8B5E3C"/><stop offset="100%" stop-color="#6b4325"/></radialGradient>

  function speciesGroup(species){
    const t = (species||'').toLowerCase();
    if(/cane|cagnol/.test(t)) return 'floppy';
    if(/gatt|volp/.test(t)) return 'pointy';
    if(/coniglio|lepre/.test(t)) return 'long';
    if(/ors|top|rat/.test(t)) return 'round';
    if(/gufo|civetta/.test(t)) return 'owl';
    if(/riccio/.test(t)) return 'hedgehog';
    if(/uccell|passer|gallin|anatra|pulcin/.test(t)) return 'bird';
    if(/bambin|persona|uomo|donna|ragazz|folletto|elfo|fata|mamma|pap[aà]/.test(t)) return 'human';
    return 'badge';
  }
  function genericCharacter(x,y,s,d){
    d = d || {};
    const grp = speciesGroup(d.species);
    const opts = { main:d.colorMain||'#B7AED1', light:d.colorLight||'#D3C9EE', dark:d.colorDark||'#6b4325', emoji:d.emoji };
    if(grp==='floppy' || grp==='pointy' || grp==='long' || grp==='round') return furryTemplate(x,y,s,{...opts, ear:grp});
    if(grp==='hedgehog') return hedgehogTemplate(x,y,s,opts);

    if(grp==='bird') return birdTemplate(x,y,s,{...opts, owl:false});
    if(grp==='human') return humanTemplate(x,y,s,opts);
    return badgeTemplate(x,y,s,opts);
  }

    const colors={0:'#FF7A64',1:'#FFC93C',2:'#5FB86B'};
    let html = '<div class="stage-trail">';
    for(let i=0;i<3;i++){ const c = path[i]!==undefined ? colors[path[i]] : '#E7DFCB'; html += `<div class="paw" style="background:${c}">🐾</div>`; }
    return html + '</div>';
  }
  function buildPageHTML(msg){
    const path = msg.path || [];
    if(msg.mode==='cover'){
      return `<div class="art-illustration">${getScene('cover')}</div>
        <h1 class="title">${STORY.title}</h1>
        <div class="subtitle-author">${STORY.authorLine}</div>
        <p class="waiting">In attesa che il conduttore inizi l'avventura…</p>`;
    }
    if(msg.mode==='story'){
      return `${pawsHtml(path)}<div class="art-illustration">${getScene('introSurprise')}</div><p class="big-text">${STORY.introText}</p>`;
    }
    if(msg.mode==='choice'){
      const opts = optionsFor(msg.step);
      return `${pawsHtml(path)}<div class="art-illustration">${getScene(sceneForChoice(msg.step))}</div>
        <p class="prompt-big">${promptFor(msg.step)}</p>
        <div class="options-row">${opts.map(o=>`<div class="opt-card ${o.color}"><span class="emoji-badge">${o.emoji}</span>${o.label}</div>`).join('')}</div>`;
    }
    if(msg.mode==='transition'){
      return `${pawsHtml(path)}<div class="art-illustration">${getScene(msg.scene)}</div><p class="big-text">${msg.text}</p>`;
    }
    if(msg.mode==='ending'){
      return `${pawsHtml(path)}<div class="art-illustration">${getScene(msg.data.scene)}</div>
        <h2 class="end-title-stage">${msg.data.title}</h2>
        <p class="big-text" style="font-size:min(2vw,2vh);">${msg.data.story}</p>
        <div class="moral-stage"><b>💛 La Morale di oggi:</b><br>${msg.data.moral}</div>`;
    }
    return '';
  }

  /* ---------------- MODALITA' ---------------- */
  const params = new URLSearchParams(location.search);
  const isStage = params.get('stage') === '1';
  document.body.className = isStage ? 'mode-stage' : 'mode-conductor';

  if(isStage){
    document.body.innerHTML = `<div class="book-outer"><div class="page" id="page"></div></div>`;
    const page = document.getElementById('page');
    let initialized = false;
    function flipTo(msg){
      const html = buildPageHTML(msg);
      if(!initialized){ page.innerHTML = html; initialized = true; return; }
      page.style.transition = 'transform .45s ease-in'; page.style.transform = 'rotateY(-92deg)';
      setTimeout(()=>{
        page.innerHTML = html; page.style.transition = 'none'; page.style.transform = 'rotateY(92deg)';
        void page.offsetWidth;
        page.style.transition = 'transform .45s ease-out'; page.style.transform = 'rotateY(0deg)';
      }, 460);
    }
    window.addEventListener('message', (e)=>{
      if(e.data && e.data.type==='render'){ STORY = e.data.storyData || STORY; flipTo(e.data); }
    });
    page.innerHTML = STORY ? `<div class="art-illustration">${getScene('cover')}</div><p class="waiting">Collegamento alla regia in corso…</p>` : `<p class="waiting">In attesa dei dati della favola…</p>`;
    if(window.opener) window.opener.postMessage({type:'stage-ready'}, '*');
    return;
  }

  /* ---------------- REGIA / CREATORE ---------------- */
  async function callClaude(system, user){
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system, messages:[{role:"user", content:user}] })
    });
    const data = await resp.json();
    if(!data || !data.content) throw new Error('Risposta non valida dal modello');
    const text = data.content.map(b=>b.text||'').join('\n');
    const clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
    return JSON.parse(clean);
  }

  async function generateStoryAI(form, onProgress){
    const SYS1 = `Sei un assistente che crea personaggi e la prima parte di una favola interattiva per bambini in lingua italiana. Rispondi SOLO con un oggetto JSON valido, senza markdown e senza testo fuori dal JSON.
La favola ha una struttura fissa a bivi che non deve cambiare (cambiano solo tema, ambientazione e personaggi):
- Livello 1 (come il protagonista reagisce al problema): A=chiede aiuto a due amici; B=indaga da solo/a osservando indizi; C=chiede consiglio a un adulto/animale saggio.
- Livello 2 (come si comporta con gli altri mentre cerca): A=gentile, chiede aiuto educatamente; B=sospetta e accusa qualcuno senza prove; C=paziente, condivide qualcosa con qualcuno.
- Livello 3 (come risolve il conflitto col responsabile): A=perdona subito ed è generoso/a; B=si arrabbia e reagisce male; C=chiede spiegazioni con calma e trovano una soluzione insieme.
Il responsabile ("culprit") deve avere un motivo comprensibile e non cattivo (fame, paura, bisogno di aiuto) coerente con la trama data.
Schema esatto da restituire:
{"title":string,"objectEmoji":string(un emoji),"characters":{"protagonist":{"name":string,"species":string,"emoji":string,"colorMain":string(hex),"colorLight":string(hex)},"friend1":{...},"friend2":{...},"wiseElder":{...},"suspect":{...},"helper":{...},"culprit":{...},"parentHelper":{...}},"introText":string(max 40 parole),"prompts":{"step1":string(max 18 parole),"step2":string(max 18 parole),"step3":string(max 22 parole)},"level1":[{"label":string(max 8 parole),"transition":string(max 30 parole)},{...},{...}],"level2":[{"label":string(max 8 parole),"transition":string(max 30 parole)},{...},{...}],"level3":[{"label":string(max 8 parole)},{...},{...}]}
Linguaggio semplice e positivo, adatto a bambini di ${form.age}.`;
    const USER1 = `Protagonista: ${form.name} (${form.species}). Ambientazione: ${form.setting}. Trama: ${form.plot}. Tipo di personaggi: ${form.charType}. Titolo suggerito dall'utente (usalo se non è vuoto, altrimenti inventane uno adatto): "${form.title}".`;
    const part1 = await callClaude(SYS1, USER1);
    onProgress('Sto scrivendo i finali e le morali della favola…');
    const c = (part1.characters && part1.characters.culprit) || {name:'qualcuno',species:''};
    const p = (part1.characters && part1.characters.parentHelper) || {name:'un adulto'};
    const prot = (part1.characters && part1.characters.protagonist) || {name:form.name, species:form.species};
    const SYS2 = `Sei un assistente che scrive i finali di una favola interattiva per bambini in italiano. Rispondi SOLO con un oggetto JSON valido, senza markdown.
Genera 8 array di 3 stringhe (indice 0=rosso, 1=giallo, 2=verde) per queste situazioni fisse:
aIntro[i]: frase brevissima (max 10 parole) che riprende come il protagonista ha affrontato il primo bivio (0=grazie all'aiuto degli amici, 1=grazie alla sua osservazione, 2=grazie al consiglio del saggio).
bStory[i]: frase (max 25 parole) su come si è comportato/a al secondo bivio (0=gentile con tutti, 1=ha accusato qualcuno senza prove, 2=paziente, ha condiviso qualcosa).
cStory[i]: il finale (max 40 parole) su come si risolve l'incontro col responsabile (0=perdono e festa insieme, 1=rabbia, il responsabile scappa triste, esito amaro ma non traumatico, 2=dialogo, capiscono il motivo e trovano una soluzione insieme).
endTitle[i]: titolo breve e allegro (max 6 parole, con 1-2 emoji).
cLesson[i]: la morale in una frase semplicissima (max 18 parole) per bambini (0=perdonare chi ha un buon motivo, 1=non arrabbiarsi senza ascoltare, 2=parlare e ascoltare aiuta a trovare soluzioni).
cExplain[i]: spiegazione semplicissima (max 22 parole) di cLesson[i], con un piccolo esempio legato alla storia.
bExplain[i]: spiegazione semplice (max 18 parole) della lezione del secondo bivio.
aExplain[i]: spiegazione semplice (max 16 parole) della lezione del primo bivio.
Schema: {"aIntro":[...],"bStory":[...],"cStory":[...],"endTitle":[...],"cLesson":[...],"cExplain":[...],"bExplain":[...],"aExplain":[...]}
Linguaggio adatto a bambini di ${form.age}.`;
    const USER2 = `Protagonista: ${prot.name} (${prot.species}). Responsabile: ${c.name} (${c.species}), motivo legato a "${form.plot}". Aiutante finale: ${p.name}. Ambientazione: ${form.setting}.`;
    const part2 = await callClaude(SYS2, USER2);
    const colors=['red','yellow','green'], emojis=['🔴','🟡','🟢'], sc1=['l1red','l1yellow','l1green'], sc2=['l2red','l2yellow','l2green'];
    return {
      isCustom:true,
      title: part1.title || form.title || 'La Mia Favola Interattiva',
      authorLine: form.author ? ('UNA FAVOLA INTERATTIVA DI ' + form.author.toUpperCase()) : 'UNA FAVOLA INTERATTIVA',
      objectEmoji: part1.objectEmoji || '❓',
      characters: part1.characters,
      introText: part1.introText,
      prompts: part1.prompts,
      level1: part1.level1.map((o,i)=>({color:colors[i], emoji:emojis[i], label:o.label, transition:o.transition, scene:sc1[i]})),
      level2: part1.level2.map((o,i)=>({color:colors[i], emoji:emojis[i], label:o.label, transition:o.transition, scene:sc2[i]})),
      level3: part1.level3.map((o,i)=>({color:colors[i], emoji:emojis[i], label:o.label})),
      aIntro:part2.aIntro, bStory:part2.bStory, cStory:part2.cStory,
      endTitle:part2.endTitle, endScene:['endRed','endYellow','endGreen'],
      cLesson:part2.cLesson, cExplain:part2.cExplain, bExplain:part2.bExplain, aExplain:part2.aExplain
    };
  }

  function buildExportHTML(){
    const dataScript = `window.STORY = ${JSON.stringify(STORY)};`;
    const bootScript = `(${boot.toString()})();`;
    const safeTitle = (STORY.title || 'Favola Interattiva').replace(/</g,'');
    return `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>${safeTitle}</title></head><body>
<script>${dataScript}<\/script>
<script>${bootScript}<\/script>
</body></html>`;
  }
  function downloadStory(){
    const html = buildExportHTML();
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const slug = (STORY.title||'favola').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'_');
    a.href = url; a.download = `favola_${slug||'interattiva'}.html`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }

  function renderSetupForm(){
    document.body.innerHTML = `
      <div class="panel">
        <h1>✨ Creatore di Favole Interattive</h1>
        <p class="sub">Compila i campi per generare una favola a bivi con la stessa struttura de "Il Mistero dell'Osso di Oliva" (3 bivi, 27 finali), ma con una storia tutta nuova. Oppure prova subito l'esempio.</p>
        <div class="setup-form">
          <div class="field-row">
            <div class="field-group"><label>Nome del protagonista</label><input type="text" id="fName" placeholder="es. Milo"></div>
            <div class="field-group"><label>Che tipo di animale/persona è</label><input type="text" id="fSpecies" placeholder="es. orsetto, coniglietta, bambina..."></div>
          </div>
          <div class="field-group"><label>Dove si svolge la storia</label><input type="text" id="fSetting" placeholder="es. un villaggio tra le montagne"></div>
          <div class="field-group"><label>Un cenno della trama (il problema centrale)</label><textarea id="fPlot" placeholder="es. il giocattolo preferito di Milo è scomparso dalla sua cameretta"></textarea></div>
          <div class="field-row">
            <div class="field-group"><label>A chi è rivolta</label>
              <select id="fAge"><option value="3-5 anni">3-5 anni</option><option value="6-8 anni">6-8 anni</option><option value="8-10 anni">8-10 anni</option></select>
            </div>
            <div class="field-group"><label>Tipo di personaggi</label>
              <select id="fType"><option value="animali antropomorfi">Animali antropomorfi</option><option value="persone">Persone</option><option value="misto">Misto</option></select>
            </div>
          </div>
          <div class="field-row">
            <div class="field-group"><label>Titolo (opzionale)</label><input type="text" id="fTitle" placeholder="Lascia vuoto per farlo inventare all'AI"></div>
            <div class="field-group"><label>Autore (opzionale)</label><input type="text" id="fAuthor" placeholder="Il tuo nome"></div>
          </div>
        </div>
        <div class="row-buttons">
          <button class="btn generate" id="genBtn">🪄 Genera la favola con l'AI</button>
          <button class="btn open" id="exampleBtn">🐶 Usa la favola di esempio (Oliva)</button>
        </div>
        <div id="statusArea"></div>
      </div>
    `;
    document.getElementById('exampleBtn').onclick = ()=>{ STORY = STORY_OLIVA; window.STORY = STORY; renderReadyApp(); };
    document.getElementById('genBtn').onclick = async ()=>{
      const form = {
        name: document.getElementById('fName').value.trim() || 'Il protagonista',
        species: document.getElementById('fSpecies').value.trim() || 'un animaletto del bosco',
        setting: document.getElementById('fSetting').value.trim() || 'un bosco incantato',
        plot: document.getElementById('fPlot').value.trim() || 'un oggetto a cui tiene molto è scomparso',
        age: document.getElementById('fAge').value,
        charType: document.getElementById('fType').value,
        title: document.getElementById('fTitle').value.trim(),
        author: document.getElementById('fAuthor').value.trim()
      };
      const statusArea = document.getElementById('statusArea');
      const genBtn = document.getElementById('genBtn');
      genBtn.disabled = true;
      statusArea.innerHTML = `<div class="loading-box"><div class="spinner"></div><span>Sto inventando i personaggi e l'inizio della storia…</span></div>`;
      try{
        const generated = await generateStoryAI(form, (msg)=>{ statusArea.innerHTML = `<div class="loading-box"><div class="spinner"></div><span>${msg}</span></div>`; });
        STORY = generated; window.STORY = generated;
        renderReadyApp();
      }catch(err){
        statusArea.innerHTML = `<div class="error-box">😕 Non sono riuscito a generare la favola (${(err&&err.message)||'errore sconosciuto'}). Riprova, oppure usa la favola di esempio qui sotto.</div>`;
        genBtn.disabled = false;
      }
    };
  }

  function renderReadyApp(){
    document.body.innerHTML = `
      <div class="panel">
        <h1>🎬 Regia — ${STORY.title}</h1>
        <p class="sub">Conduci qui la favola. I bambini vedranno solo la finestra "Palco".</p>
        <div class="row-buttons">
          <button class="btn download" id="downloadBtn">⬇️ Scarica il file per la proiezione (HDMI)</button>
          <button class="btn restart" id="newStoryBtn">✨ Crea una nuova favola</button>
        </div>
        <div class="status-row"><div class="dot-status" id="statusDot"></div><span id="statusText">Schermo di proiezione non aperto</span></div>
        <div class="row-buttons">
          <button class="btn open" id="openStageBtn">🖥️ Apri schermo di proiezione</button>
          <button class="btn mirror" id="mirrorBtn">👁️ Mostra anteprima su questo PC</button>
        </div>
        <div class="instructions">
          <b>Per la proiezione reale su TV/proiettore via HDMI:</b><br>
          1) Clicca <b>"⬇️ Scarica il file per la proiezione"</b> e apri il file scaricato con un browser sul PC (fuori da questa pagina).<br>
          2) In quel file: collega il PC allo schermo esterno in modalità "Estendi", clicca "Apri schermo di proiezione", trascina la finestra sullo schermo esterno e premi F11.<br>
          3) Qui invece puoi già provare subito la favola con i pulsanti qui sotto, e usare l'anteprima per vedere in piccolo cosa vedrebbero i bambini.
        </div>
        <div class="mirror-wrap" id="mirrorWrap"><div class="mirror-bezel"><div class="mirror-screen" id="mirrorScreen"><div class="page" id="mirrorPage"></div></div></div><div class="mirror-label">ANTEPRIMA DELLO SCHERMO ESTERNO</div></div>
        <div class="trail-mini" id="trailMini"></div>
        <div class="section-title">Cosa vedono ora i bambini</div>
        <div class="preview-box" id="previewBox">La copertina della favola.</div>
        <div class="section-title">Controlli</div>
        <div id="controlsArea"></div>
        <button class="btn restart" id="restartBtn">🔁 Ricomincia questa favola</button>
      </div>
    `;
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const previewBox = document.getElementById('previewBox');
    const controlsArea = document.getElementById('controlsArea');
    const trailMini = document.getElementById('trailMini');
    const openStageBtn = document.getElementById('openStageBtn');
    const restartBtn = document.getElementById('restartBtn');
    const mirrorBtn = document.getElementById('mirrorBtn');
    const mirrorWrap = document.getElementById('mirrorWrap');
    const mirrorPage = document.getElementById('mirrorPage');

    let stageWindow = null;
    let mirrorOn = false;
    let path = [];
    let lastMessage = { type:'render', mode:'cover', path:[] };

    function updateMirror(msg){ mirrorPage.innerHTML = buildPageHTML(msg); }
    function sendToStage(msg){
      msg.storyData = STORY;
      lastMessage = msg;
      updateMirror(msg);
      if(stageWindow && !stageWindow.closed){ stageWindow.postMessage(msg, '*'); }
    }
    mirrorBtn.onclick = ()=>{
      mirrorOn = !mirrorOn;
      mirrorWrap.classList.toggle('show', mirrorOn);
      mirrorBtn.classList.toggle('active', mirrorOn);
      mirrorBtn.textContent = mirrorOn ? '🙈 Nascondi anteprima' : '👁️ Mostra anteprima su questo PC';
      if(mirrorOn) updateMirror(lastMessage);
    };
    function updateTrailMini(){
      const colors={0:'#FF7A64',1:'#FFC93C',2:'#5FB86B'};
      trailMini.innerHTML = [0,1,2].map(i=>{ const c = path[i]!==undefined ? colors[path[i]] : '#554b60'; return `<div class="paw-mini" style="background:${c}">🐾</div>`; }).join('');
    }
    function renderControlsCover(){
      previewBox.innerHTML = "📖 La copertina della favola, con il titolo.";
      controlsArea.innerHTML = `<button class="btn open" id="startBtn" style="background:var(--leaf,#5FB86B);">📖 Apri la storia</button>`;
      document.getElementById('startBtn').onclick = ()=>{
        sendToStage({type:'render', mode:'story', path});
        previewBox.innerHTML = `💬 ${STORY.introText}`;
        controlsArea.innerHTML = `<button class="btn open" id="contBtn" style="background:#6C5CE7;">➡️ Continua al primo bivio</button>`;
        document.getElementById('contBtn').onclick = ()=>{ sendToStage({type:'render', mode:'choice', step:1, path}); renderControlsChoice(1); };
      };
    }
    function renderControlsChoice(s){
      previewBox.innerHTML = `❓ <b>${promptFor(s)}</b>`;
      const opts = optionsFor(s);
      controlsArea.innerHTML = `<div class="choices-conductor">${opts.map((o,i)=>`<button class="choice-btn ${o.color}" data-i="${i}"><span class="dotc">${o.emoji}</span>${o.label}</button>`).join('')}</div>`;
      controlsArea.querySelectorAll('.choice-btn').forEach(btn=>{
        btn.onclick = ()=>{
          const idx = parseInt(btn.dataset.i,10);
          path.push(idx);
          updateTrailMini();
          if(s < 3){
            const chosen = opts[idx];
            sendToStage({type:'render', mode:'transition', text:chosen.transition, scene:chosen.scene, path});
            previewBox.innerHTML = `💬 ${chosen.transition}`;
            controlsArea.innerHTML = `<button class="btn open" id="contBtn" style="background:#6C5CE7;">➡️ Continua al bivio successivo</button>`;
            document.getElementById('contBtn').onclick = ()=>{ sendToStage({type:'render', mode:'choice', step:s+1, path}); renderControlsChoice(s+1); };
          } else {
            const ending = buildEnding(path[0], path[1], path[2]);
            sendToStage({type:'render', mode:'ending', data:ending, path});
            previewBox.innerHTML = `🏁 <b>${ending.title}</b><br>${ending.story}<br><br><i>Morale: ${ending.moral}</i>`;
            controlsArea.innerHTML = `<p style="color:#c9bcd6;">Favola conclusa. Usa "Ricomincia" per un nuovo percorso.</p>`;
          }
        };
      });
    }
    openStageBtn.onclick = ()=>{
      const url = location.pathname + '?stage=1';
      stageWindow = window.open(url, 'favola_stage', 'width=1280,height=720');
      statusDot.classList.add('on');
      statusText.textContent = 'Finestra di proiezione aperta — trascinala sullo schermo esterno';
      setTimeout(()=> sendToStage(lastMessage), 600);
    };
    window.addEventListener('message', (e)=>{
      if(e.data && e.data.type==='stage-ready'){ statusDot.classList.add('on'); statusText.textContent = 'Proiezione connessa ✅'; sendToStage(lastMessage); }
    });
    restartBtn.onclick = ()=>{ path = []; updateTrailMini(); sendToStage({type:'render', mode:'cover', path}); renderControlsCover(); };
    document.getElementById('downloadBtn').onclick = downloadStory;
    document.getElementById('newStoryBtn').onclick = ()=>{ STORY = null; window.STORY = null; renderSetupForm(); };

    updateTrailMini();
    updateMirror(lastMessage);
    renderControlsCover();
  }

  if(!STORY){ renderSetupForm(); } else { renderReadyApp(); }
}
boot();
</script>
</body>
